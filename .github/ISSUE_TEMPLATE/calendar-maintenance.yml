name: Calendar maintenance task
description: Track actionable work from a calendar source discussion.
title: "[calendar] "
labels: ["calendar", "governance"]
body:
  - type: markdown
    attributes:
      value: |
        Use this issue after a GitHub Discussion has clarified the calendar source decision.

        Add the issue to the NBTCA organization Roadmap and set it to `In Progress` when an owner and next action are clear.
  - type: input
    id: discussion
    attributes:
      label: Discussion link
      description: Link the GitHub Discussion where the source decision is being discussed.
      placeholder: https://github.com/orgs/nbtca/discussions/...
    validations:
      required: true
  - type: dropdown
    id: source_type
    attributes:
      label: Source type
      options:
        - School academic calendar
        - Member date policy or consented member date
        - NBTCA event or milestone
        - Calendar distribution or downstream sync
    validations:
      required: true
  - type: textarea
    id: implementation
    attributes:
      label: Implementation scope
      description: What files, calendar sources, or downstream outputs need to change?
      value: |
        - nbtca/documents:
        - nbtca/nbtcal:
        - Calendar subscription:
    validations:
      required: true
  - type: input
    id: roadmap
    attributes:
      label: Roadmap status
      description: Project name and status field value.
      placeholder: NBTCA Roadmap / In Progress
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How will maintainers confirm the calendar data is correct after the change?
      placeholder: Compare generated ICS against the source notice and import it into at least one calendar app.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy and consent
      options:
        - label: No private member data is included in this issue.
          required: true
        - label: Any member-specific date has explicit consent before publication or distribution.
