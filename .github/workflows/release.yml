name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # OIDC for npm trusted publishing (provenance is automatic)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      # Trusted publishing needs npm >= 11.5.1, newer than the bundled version.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm test
      - run: npm run build
      # Auth via OIDC trusted publishing — no NPM_TOKEN, no stored secret.
      - run: npm publish --access public
